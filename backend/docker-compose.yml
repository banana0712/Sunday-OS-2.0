# SundayOS Docker Compose
# 包含：FastAPI 后端 + PostgreSQL + Redis + ChromaDB
version: "3.9"

services:
  # ========== SundayOS API 服务 ==========
  api:
    build: .
    container_name: sundayos-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DEBUG=false
      - SUNDAY_API_KEY=${SUNDAY_API_KEY:-change-me}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - DATABASE_URL=postgresql+asyncpg://sunday:sunday@db:5432/sundayos
      - DATABASE_URL_SYNC=postgresql://sunday:sunday@db:5432/sundayos
      - REDIS_URL=redis://redis:6379/0
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - ASSISTANT_NAME=${ASSISTANT_NAME:-Sunday}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - chroma_data:/app/chroma_data

  # ========== PostgreSQL 数据库 ==========
  db:
    image: postgres:16-alpine
    container_name: sundayos-db
    environment:
      - POSTGRES_USER=sunday
      - POSTGRES_PASSWORD=${DB_PASSWORD:-sunday}
      - POSTGRES_DB=sundayos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunday -d sundayos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========== Redis 缓存 ==========
  redis:
    image: redis:7-alpine
    container_name: sundayos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========== ChromaDB 向量数据库 ==========
  chromadb:
    image: chromadb/chroma:latest
    container_name: sundayos-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chroma_data:
